version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: leadforge_postgres_dev
    restart: always
    environment:
      POSTGRES_DB: leadforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - leadforge_data:/var/lib/postgresql/data

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: leadforge_api_dev
    working_dir: /app
    volumes:
      - ./api:/app
    command: dotnet watch run --project LeadForge/LeadForge.csproj
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=leadforge;Username=postgres;Password=postgres
      OpenAI__ApiKey: ${OPENAI_API_KEY}
    ports:
      - '8080:8080'

  frontend:
    image: node:20-alpine
    container_name: leadforge_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  leadforge_data:
