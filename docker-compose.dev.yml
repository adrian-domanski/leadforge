version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: leadforge_postgres_dev
    restart: always
    environment:
      POSTGRES_DB: leadforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - leadforge_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    container_name: leadforge_api_dev
    working_dir: /app
    volumes:
      - ./api:/app
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Jwt__Key: ${JWT_SECRET}
      ASPNETCORE_URLS: http://0.0.0.0:8080
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: leadforge_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  leadforge_data:
