version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: leadforge_postgres
    restart: always
    environment:
      POSTGRES_DB: leadforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - leadforge_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: leadforge_api
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Jwt__Key: ${JWT_SECRET}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: leadforge_frontend
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  leadforge_data:
